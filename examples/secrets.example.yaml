# Example Home Assistant secrets.yaml entries.
#
# Copy these key names into your real:
#   /config/secrets.yaml
#
# Do not commit your real /config/secrets.yaml file.
# Do not paste real passwords into GitHub issues or examples.

# Username used to log in to the switch over SSH/SFTP.
#
# This user needs enough privilege to:
#   - upload files by SFTP
#   - enter extended CLI mode if required
#   - configure PKI domain / SSL policy
#   - save the running configuration
hpe_switch_cert_update_user: "admin"

# Password for the switch login user above.
hpe_switch_cert_update_user_password: "CHANGE_ME"

# Password used by HPE 1950 / Comware to enter extended CLI mode:
#   xtd-cli-mode
#
# This is switch/firmware dependent.
# Do not assume this example value applies to your switch.
hpe_1950_xtd_cli_mode_password: "CHANGE_ME"
